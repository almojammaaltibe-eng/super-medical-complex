<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجمع شبراملس الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0097a7; --accent-color: #00bcd4; --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card-bg: rgba(255, 255, 255, 0.95); --success-color: #2e7d32; --cancel-color: #d32f2f; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-gradient); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: var(--card-bg); border-radius: 30px; padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-top: 8px solid var(--primary-color); width: 100%; max-width: 600px; }
        .main-logo { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent-color); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary-color); }
        input, select { width: 100%; padding: 12px; border: 2px solid #cfd8dc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .submit-btn { flex: 2; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .cancel-btn { flex: 1; padding: 15px; background: #eee; border: none; border-radius: 10px; cursor: pointer; }
        #success-msg, #loader { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>مجمع شبراملس الطبي</h2>
    <form id="booking-form">
        <div class="form-group">
            <label>اسم المريض:</label>
            <input type="text" id="pName" required placeholder="الاسم الثلاثي">
        </div>
        <div class="form-group">
            <label>يوم الحجز:</label>
            <select id="bDay" required onchange="updateSpecialties()">
                <option value="">اختر اليوم...</option>
                <option value="السبت">السبت</option><option value="الأحد">الأحد</option><option value="الإثنين">الإثنين</option><option value="الثلاثاء">الثلاثاء</option><option value="الأربعاء">الأربعاء</option><option value="الخميس">الخميس</option><option value="الجمعة">الجمعة</option>
            </select>
        </div>
        <div class="form-group">
            <label>العيادة:</label>
            <select id="specialty" required onchange="updateDoctors()">
                <option value="">اختر اليوم أولاً...</option>
            </select>
        </div>
        <div class="form-group">
            <label>الطبيب:</label>
            <select id="doctorName" required>
                <option value="">اختر العيادة أولاً...</option>
            </select>
        </div>
        <div class="button-group">
            <button type="submit" class="submit-btn" id="btn">تأكيد الحجز</button>
            <button type="button" class="cancel-btn" onclick="location.reload()">إلغاء</button>
        </div>
        <p id="loader">جاري الإرسال... ⏳</p>
    </form>

    <div id="success-msg">
        <h3 style="color:var(--success-color);">✅ تم تسجيل الحجز بنجاح</h3>
        <p>المريض: <b id="res-name"></b></p>
        <p>الطبيب: <b id="res-doc"></b></p>
        <div style="background: #e0f7fa; padding: 15px; border-radius: 10px; margin: 10px 0;">
            <p>رقم دورك هو:</p>
            <h1 style="color:var(--primary-color);" id="res-turn"></h1>
        </div>
        <button onclick="location.reload()" class="submit-btn">حجز جديد</button>
    </div>
</div>

<script>
    // ضع رابط السكربت الخاص بك هنا
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5aI4G2bgiis5I8G2uwhgv93duRxiD7KPaAsrisgp96i8BKJMgfC1bL4Tm9gqGzjefeA/exec";

    const scheduleData = {
        "السبت": { "أسنان": ["د. رنا حمودة (04:00 عصراً)", "د. خالد الداهس (09:00 مساءً)"], "مسالك بولية": ["د. علي منتصر (07:00 مساءً)"], "أنف وأذن وحنجرة": ["د. محمد هيكل (07:00 مساءً)"], "عيون": ["د. محمد مجدي سعده (02:00 ظهراً)"] },
        "الأحد": { "قلب وأوعية": ["د. أحمد مسعد الغلبان (06:00 مساءً)"], "أسنان": ["د. محمد علاء (03:00 مساءً)", "د. محمود دهب (08:00 مساءً)"], "عيون": ["د. خالد أحمد الشيخ (05:00 عصراً)"], "مسالك بولية": ["د. علي منتصر (07:00 مساءً)"], "عظام": ["د. إبراهيم مطاوع (04:00 عصراً)"] },
        "الإثنين": { "نساء وتوليد": ["د. هيام السمراوي (01:00 ظهراً)"], "جراحة مخ وأعصاب": ["د. محمد سلام (08:00 مساءً)"], "أسنان": ["د. رنا حمودة (04:00 عصراً)", "د. خالد الداهس (09:00 مساءً)"], "مسالك بولية": ["د. علي منتصر (07:00 مساءً)"], "أطفال وحديثي الولاده": ["د. جينا عبدالله الشافعي (06:00 مساءً)"] },
        "الثلاثاء": { "أنف وأذن وحنجرة": ["د. سناء الحماقي (04:00 مساءً)"], "نفسية وعصبية": ["د. آلاء الحوت (06:00 مساءً)"], "أسنان": ["د. محمد علاء (03:00 مساءً)", "د. محمود دهب (08:00 مساءً)"], "مسالك بولية": ["د. علي منتصر (07:00 مساءً)"], "عظام": ["د. إبراهيم مطاوع (04:00 عصراً)"], "عيون": ["د. محمد مجدي سعده (02:00 ظهراً)"] },
        "الأربعاء": { "أسنان": ["د. رنا حمودة (04:00 عصراً)", "د. خالد الداهس (09:00 مساءً)"], "قلب وأوعية": ["د. أحمد مسعد الغلبان (06:00 مساءً)"], "مسالك بولية": ["د. علي منتصر (07:00 مساءً)"], "أطفال وحديثي الولاده": ["د. جينا عبدالله الشافعي (06:00 مساءً)"] },
        "الخميس": { "قلب وأوعية": ["د. أحمد مسعد الغلبان (06:00 مساءً)"], "أنف وأذن وحنجرة": ["د. محمد هيكل (07:00 مساءً)"], "أسنان": ["د. محمد علاء (03:00 مساءً)", "د. محمود دهب (08:00 مساءً)"], "مسالك بولية": ["د. علي منتصر (07:00 مساءً)"], "عظام": ["د. إبراهيم مطاوع (04:00 عصراً)"], "عيون": ["د. محمد مجدي سعده (02:00 ظهراً)"], "صدر": ["د. أسامة الخشن (05:00 عصراً)"] },
        "الجمعة": { "باطنة ومناظير": ["د. عزيز بدير (02:00 ظهراً)"] }
    };

    window.updateSpecialties = function() {
        const day = document.getElementById('bDay').value;
        const specSelect = document.getElementById('specialty');
        const docSelect = document.getElementById('doctorName');
        specSelect.innerHTML = '<option value="">اختر العيادة...</option>';
        docSelect.innerHTML = '<option value="">اختر العيادة أولاً...</option>';
        if(day && scheduleData[day]) {
            Object.keys(scheduleData[day]).forEach(s => specSelect.add(new Option(s, s)));
        }
    }

    window.updateDoctors = function() {
        const day = document.getElementById('bDay').value;
        const spec = document.getElementById('specialty').value;
        const docSelect = document.getElementById('doctorName');
        docSelect.innerHTML = '<option value="">اختر الطبيب...</option>';
        if(day && spec && scheduleData[day][spec]) {
            scheduleData[day][spec].forEach(d => docSelect.add(new Option(d, d)));
        }
    }

    document.getElementById('booking-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const formData = {
            patientName: document.getElementById('pName').value,
            bookingDay: document.getElementById('bDay').value,
            specialty: document.getElementById('specialty').value,
            doctorName: document.getElementById('doctorName').value
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(formData)
            });
            const result = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('booking-form').style.display = 'none';
            
            document.getElementById('res-name').innerText = formData.patientName;
            document.getElementById('res-doc').innerText = result.doctor; // تأكد أن السكربت يرسل doctor
            document.getElementById('res-turn').innerText = result.turn;
            document.getElementById('success-msg').style.display = 'block';
        } catch (e) {
            alert("حدث خطأ، يرجى المحاولة لاحقاً");
            document.getElementById('btn').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    });
</script>
</body>
</html>
