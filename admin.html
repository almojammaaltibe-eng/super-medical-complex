<script>
    // الرابط المباشر للملف - تم التأكد منه
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo0c_d872Pwd3J8f0E6J888snH1yiXfxAU8frZfHsmnXLLX8-71au8zedPQTa0itwXIsWQzs0aNZUS/pub?output=csv";

    const schedule = {
        "السبت": ["أسنان", "مسالك", "أنف وأذن", "عيون"],
        "الأحد": ["قلب", "أسنان", "عيون", "عظام"],
        "الإثنين": ["نساء", "مخ وأعصاب", "أسنان"],
        "الثلاثاء": ["نفسية", "أسنان", "عظام"],
        "الأربعاء": ["أسنان", "قلب", "اطفال"],
        "الخميس": ["قلب", "أنف وأذن", "عظام"],
        "الجمعة": ["باطنة ومناظير"]
    };

    function initSidebar() {
        const list = document.getElementById('days-list');
        list.innerHTML = ""; 
        Object.keys(schedule).forEach(day => {
            const btn = document.createElement('button');
            btn.className = 'day-btn';
            btn.innerText = day;
            btn.onclick = () => toggleClinics(day, btn);
            
            const container = document.createElement('div');
            container.className = 'clinics-container';
            container.id = `clinics-${day}`;
            
            schedule[day].forEach(clinic => {
                const link = document.createElement('div');
                link.className = 'clinic-link';
                link.innerText = clinic;
                link.onclick = (e) => {
                    e.stopPropagation();
                    loadBookings(day, clinic);
                };
                container.appendChild(link);
            });

            list.appendChild(btn);
            list.appendChild(container);
        });
    }

    function toggleClinics(day, btn) {
        document.querySelectorAll('.clinics-container').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`clinics-${day}`).style.display = 'flex';
        btn.classList.add('active');
        loadBookings(day, "الكل");
    }

    // وظيفة محسنة لتقسيم سطر CSV مع احترام الفواصل داخل الأقواس
    function parseCSVRow(row) {
        const result = [];
        let cur = '';
        let inQuote = false;
        for (let char of row) {
            if (char === '"') inQuote = !inQuote;
            else if (char === ',' && !inQuote) {
                result.push(cur.trim());
                cur = '';
            } else cur += char;
        }
        result.push(cur.trim());
        return result;
    }

    async function loadBookings(day = "الكل", clinic = "الكل") {
        const tbody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');
        const viewTitle = document.getElementById('current-view-title');

        viewTitle.innerText = `عرض: ${day} | ${clinic}`;
        tbody.innerHTML = "";
        loader.style.display = "block";
        loader.innerText = "جاري تحديث البيانات من السحابة... ⏳";

        try {
            // إضافة cache: 'no-store' تضمن أن المتصفح يسحب أحدث البيانات دائماً
            const response = await fetch(SHEET_URL + "&t=" + new Date().getTime(), { cache: 'no-store' });
            if (!response.ok) throw new Error('فشل الوصول للملف');
            
            const data = await response.text();
            
            // تقسيم الأسطر بشكل سليم
            const lines = data.split(/\r?\n/).filter(line => line.trim() !== "");
            const rows = lines.map(line => parseCSVRow(line).map(cell => cell.replace(/"/g, '')));
            
            loader.style.display = "none";
            const bookings = rows.slice(1); // تخطي سطر العنوان

            let found = false;
            let displayCounter = 1;

            bookings.forEach(cols => {
                if (cols.length < 3) return; // سطر فارغ

                const patient = cols[0];
                const rowDay = cols[1];
                const specialty = cols[2];
                const doctor = cols[3] || '-';
                const timestamp = cols[4] || '-';

                const matchDay = (day === "الكل" || rowDay === day);
                const matchClinic = (clinic === "الكل" || specialty.includes(clinic));

                if (matchDay && matchClinic) {
                    found = true;
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight:bold; color:var(--primary-color); text-align:center;">${displayCounter}</td> 
                            <td>${patient}</td>
                            <td>${specialty}</td>
                            <td>${doctor}</td>
                            <td>${rowDay}</td>
                            <td style="direction:ltr; text-align:right;">${timestamp}</td>
                        </tr>`;
                    displayCounter++;
                }
            });

            if (!found) {
                tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 20px; color: #666;'>📭 لا توجد حجوزات مسجلة لهذا الاختيار</td></tr>";
            }
        } catch (e) { 
            loader.innerText = "⚠️ تعذر جلب البيانات. تأكد من اتصالك بالإنترنت ومن فتح الرابط من GitHub وليس من جهازك مباشرة.";
            console.error("Kemo Code Error:", e);
        }
    }

    window.saveAsImage = function() {
        if (typeof html2canvas === 'undefined') {
            alert("يرجى الانتظار حتى تحميل مكتبة التصوير...");
            return;
        }
        html2canvas(document.getElementById('capture-area')).then(canvas => {
            const link = document.createElement('a');
            link.download = `حجوزات_${day === "الكل" ? "مجمع_شبراملس" : day}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    document.getElementById('today-date').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    initSidebar();
    loadBookings("الكل", "الكل");
</script>
