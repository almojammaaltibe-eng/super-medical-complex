<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مجمع شبراملس</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0097a7; --accent: #006064; --bg: #f0f4f4; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* القائمة الجانبية */
        .sidebar { width: 280px; background: white; border-left: 2px solid #ddd; overflow-y: auto; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar h3 { color: var(--primary); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .doc-item { padding: 12px; margin-bottom: 8px; background: #f9f9f9; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid #eee; font-weight: 700; color: #444; }
        .doc-item:hover { background: var(--primary); color: white; transform: translateX(-5px); }
        .doc-item.active { background: var(--accent); color: white; }

        /* المحتوى الرئيسي */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        th { background: var(--primary); color: white; padding: 15px; text-align: center; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-size: 16px; }
        .turn-no { background: #d32f2f; color: white; padding: 6px 15px; border-radius: 20px; font-weight: 900; }
        
        #currentDocTitle { color: var(--accent); margin: 0; }
        .refresh-btn { padding: 8px 15px; background: #eee; border: none; border-radius: 5px; cursor: pointer; font-family: 'Tajawal'; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>الأطباء 👨‍⚕️</h3>
    <div id="doctorsList">
        </div>
</div>

<div class="main-content">
    <div class="header-area">
        <h2 id="currentDocTitle">اختر طبيباً من القائمة</h2>
        <button class="refresh-btn" onclick="fetchData()">تحديث البيانات 🔄</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>رقم الدور</th>
                <th>اسم المريض</th>
                <th>اليوم</th>
            </tr>
        </thead>
        <tbody id="resBody">
            <tr><td colspan="3" style="color:#999;">يرجى اختيار طبيب لعرض حجوزاته</td></tr>
        </tbody>
    </table>
</div>

<script>
    const csvURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRo0c_d872Pwd3J8f0E6J888snH1yiXfxAU8frZfHsmnXLLX8-71au8zedPQTa0itwXIsWQzs0aNZUS/pub?output=csv';
    
    // قائمة الأطباء (يجب أن تطابق الأسماء في كود index.html تماماً)
    const doctors = [
        "د. رنا حمودة (أسنان)", "د. خالد الداهس (أسنان)", "د. علي منتصر (مسالك بولية)",
        "د. محمد هيكل (أنف وأذن وحنجرة)", "محمد مجدي سعده (عيون)", "د. أحمد مسعد الغلبان (قلب وأوعية)",
        "د. محمد علاء (أسنان)", "د. محمود دهب (أسنان)", "د. خالد أحمد الشيخ (رمد)",
        "د.إبراهيم مطاوع (عظام وعمود فقري)", "د. هيام السمراوي (نساء وتوليد)", "د. محمد سلام (مخ وأعصاب)",
        "د. سناء الحماقي (أنف وأذن)", "د. آلاء الحوت (نفسية وعصبية)", "إبراهيم مطاوع (عظام وعمود فقري)",
        "د. جينا عبدالله الشافعي (اطفال)", "د. عزيز بدير (باطنة ومناظير)"
    ];

    let allData = [];

    // إنشاء القائمة الجانبية
    function initSidebar() {
        const list = document.getElementById('doctorsList');
        doctors.forEach(doc => {
            const div = document.createElement('div');
            div.className = 'doc-item';
            div.innerText = doc;
            div.onclick = () => showDoctorAppointments(doc, div);
            list.appendChild(div);
        });
    }

    async function fetchData() {
        try {
            const response = await fetch(csvURL);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            allData = rows.map(r => {
                const c = r.split(',');
                return { name: c[0], day: c[1], doc: c[3], turn: c[5] };
            });
            console.log("Data Updated");
        } catch (e) { console.error("Fetch Error"); }
    }

    function showDoctorAppointments(docName, element) {
        // تحديث التصميم النشط
        document.querySelectorAll('.doc-item').forEach(d => d.classList.remove('active'));
        element.classList.add('active');
        
        document.getElementById('currentDocTitle').innerText = "حجوزات: " + docName;
        
        const body = document.getElementById('resBody');
        body.innerHTML = '';

        // الفلترة بناءً على اسم الطبيب المختار فقط
        // نستخدم trim() لضمان عدم وجود مسافات تعطل البحث
        const filtered = allData.filter(row => row.doc && row.doc.trim() === docName.trim());

        if (filtered.length === 0) {
            body.innerHTML = '<tr><td colspan="3">لا توجد حجوزات مسجلة لهذا الطبيب</td></tr>';
        } else {
            // ترتيب حسب الدور
            filtered.sort((a, b) => parseInt(a.turn) - parseInt(b.turn));
            filtered.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="turn-no">${item.turn}</span></td>
                    <td>${item.name}</td>
                    <td>${item.day}</td>
                `;
                body.appendChild(tr);
            });
        }
    }

    // التشغيل
    initSidebar();
    fetchData();
    setInterval(fetchData, 60000); // تحديث كل دقيقة
</script>

</body>
</html>
