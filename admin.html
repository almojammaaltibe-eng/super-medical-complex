<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة الحجوزات - مجمع شبراملس</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0097a7; --accent: #006064; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .admin-container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); font-weight: 900; margin-bottom: 30px; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 30px; background: #e0f2f1; padding: 20px; border-radius: 10px; flex-wrap: wrap; justify-content: center; }
        .controls select { padding: 12px; border-radius: 8px; border: 2px solid var(--primary); font-family: 'Tajawal'; font-size: 16px; cursor: pointer; min-width: 200px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; }
        th { background-color: var(--primary); color: white; padding: 15px; font-weight: 700; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 15px; }
        tr:hover { background-color: #f1f8f9; }
        .turn-badge { background: #d32f2f; color: white; padding: 5px 12px; border-radius: 50px; font-weight: 900; font-size: 18px; }
        
        .no-data { text-align: center; padding: 40px; color: #888; font-style: italic; }
        .refresh-btn { display: block; margin: 10px auto; padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>📊 نظام إدارة حجوزات المجمع</h2>
    
    <div class="controls">
        <div>
            <label style="display:block; margin-bottom:5px; font-weight:700;">اختر اليوم:</label>
            <select id="daySelector" onchange="filterData()">
                <option value="">-- اختر اليوم --</option>
                <option value="السبت">السبت</option>
                <option value="الأحد">الأحد</option>
                <option value="الإثنين">الإثنين</option>
                <option value="الثلاثاء">الثلاثاء</option>
                <option value="الأربعاء">الأربعاء</option>
                <option value="الخميس">الخميس</option>
                <option value="الجمعة">الجمعة</option>
            </select>
        </div>
        <button class="refresh-btn" onclick="fetchData()">تحديث البيانات 🔄</button>
    </div>

    <table id="resTable">
        <thead>
            <tr>
                <th>الدور</th>
                <th>اسم المريض</th>
                <th>العيادة</th>
                <th>الطبيب</th>
            </tr>
        </thead>
        <tbody id="resBody">
            </tbody>
    </table>
    <div id="noDataMsg" class="no-data">يرجى اختيار اليوم لعرض الجدول</div>
</div>

<script>
    // الرابط الخاص بنشر الشيت كـ CSV (تأكد من استبداله برابط الشيت الخاص بك)
    const csvURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6lZ7yLCKil5NIOV2s7fdyG3dya6adALMv3pp3o0S4k/pub?output=csv';

    let allAppointments = [];

    async function fetchData() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // تجاهل سطر العناوين
            
            allAppointments = rows.map(row => {
                const cols = row.split(',');
                return {
                    name: cols[0] ? cols[0].trim() : '',
                    day: cols[1] ? cols[1].trim() : '',
                    clinic: cols[2] ? cols[2].trim() : '',
                    doctor: cols[3] ? cols[3].trim() : '',
                    turn: cols[5] ? cols[5].trim() : ''
                };
            });
            console.log("تم تحديث البيانات");
            filterData(); // تحديث العرض بعد الجلب
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
        }
    }

    function filterData() {
        const selectedDay = document.getElementById('daySelector').value;
        const resBody = document.getElementById('resBody');
        const noDataMsg = document.getElementById('noDataMsg');
        
        resBody.innerHTML = '';
        
        if (!selectedDay) {
            noDataMsg.style.display = 'block';
            noDataMsg.innerText = "يرجى اختيار اليوم لعرض الجدول";
            return;
        }

        // فلترة البيانات بناءً على اليوم المختار
        let filtered = allAppointments.filter(app => app.day === selectedDay);

        // ترتيب الحجوزات حسب رقم الدور
        filtered.sort((a, b) => parseInt(a.turn) - parseInt(b.turn));

        if (filtered.length === 0) {
            noDataMsg.style.display = 'block';
            noDataMsg.innerText = "لا توجد حجوزات مسجلة لهذا اليوم";
        } else {
            noDataMsg.style.display = 'none';
            filtered.forEach(app => {
                if(app.name) { // التأكد أن السطر ليس فارغاً
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span class="turn-badge">${app.turn}</span></td>
                        <td>${app.name}</td>
                        <td>${app.clinic}</td>
                        <td style="font-weight:700; color:var(--accent);">${app.doctor}</td>
                    `;
                    resBody.appendChild(tr);
                }
            });
        }
    }

    // جلب البيانات عند فتح الصفحة لأول مرة
    fetchData();
    // تحديث تلقائي كل دقيقتين لضمان ظهور الحجوزات الجديدة
    setInterval(fetchData, 120000);
</script>

</body>
</html>
