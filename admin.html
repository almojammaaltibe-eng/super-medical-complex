<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مجمع شبراملس</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #0097a7;
            --accent-color: #00bcd4;
            --sidebar-width: 280px;
        }
        body { font-family: 'Tajawal', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .news-ticker { 
            width: 100%; background: #d32f2f; color: white; padding: 10px 0; 
            overflow: hidden; z-index: 2000; font-weight: bold; height: 20px;
        }
        .ticker-text { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; padding-right: 100%; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        .sidebar { 
            width: var(--sidebar-width); background: #fff; border-left: 2px solid #eee; 
            display: flex; flex-direction: column; padding: 15px; box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            overflow-y: auto;
        }
        .sidebar h3 { color: var(--primary-color); text-align: center; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .day-btn { 
            width: 100%; padding: 12px; margin: 5px 0; border: none; background: #e0f7fa; 
            color: #00796b; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: 'Tajawal';
            transition: 0.3s;
        }
        .day-btn:hover, .day-btn.active { background: var(--primary-color); color: white; }

        .clinics-container { margin-top: 10px; display: none; flex-direction: column; gap: 5px; padding-right: 15px; }
        .clinic-link { 
            padding: 8px 15px; background: #f1f8f9; border-radius: 5px; cursor: pointer; 
            font-size: 14px; color: #555; border-right: 3px solid var(--accent-color); transition: 0.2s;
        }
        .clinic-link:hover { background: #00bcd4; color: white; }

        .content-area { flex: 1; padding: 20px; overflow-y: auto; }
        .dashboard-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary-color); text-align: center; margin: 0; }
        .date-display { text-align: center; color: #555; font-weight: bold; margin-bottom: 15px; font-size: 0.9em; }
        
        .top-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        button { border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; }
        .btn-print { background: var(--primary-color); color: white; }
        .btn-save-img { background: #2e7d32; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: var(--primary-color); color: white; }
        
        #loader { text-align: center; padding: 20px; display: none; font-weight: bold; color: var(--primary-color); }

        @media print { .sidebar, .news-ticker, .top-controls { display: none; } body { padding: 0; } .content-area { padding: 0; } }
    </style>
</head>
<body>

<div class="news-ticker">
    <div class="ticker-text" id="latest-booking">جاري فحص آخر التحديثات...</div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <h3>📅 جدول العيادات</h3>
        <div id="days-list"></div>
    </div>

    <div class="content-area">
        <div class="dashboard-container">
            <h2>📋 لوحة تحكم حجوزات مجمع شبراملس</h2>
            <div class="date-display">
                متابعة المواعيد المباشرة من Google Sheets | <span id="today-date"></span>
            </div>

            <div class="top-controls">
                <div id="current-view-title" style="font-weight: bold; color: var(--primary-color);">عرض: الكل</div>
                <div>
                    <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
                    <button class="btn-save-img" onclick="window.saveAsImage()">🖼️ حفظ كصورة</button>
                </div>
            </div>

            <div id="capture-area">
                <table id="bookingsTable">
                    <thead>
                        <tr>
                            <th>الدور</th>
                            <th>اسم المريض</th>
                            <th>العيادة</th>
                            <th>الطبيب</th>
                            <th>اليوم</th>
                            <th>وقت التسجيل</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="loader">جاري سحب البيانات...</div>
        </div>
    </div>
</div>

<script>
    // الرابط المحدث الذي قمت بتزويدي به
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo0c_d872Pwd3J8f0E6J888snH1yiXfxAU8frZfHsmnXLLX8-71au8zedPQTa0itwXIsWQzs0aNZUS/pub?output=csv";

    const schedule = {
        "السبت": ["أسنان", "مسالك", "أنف وأذن", "عيون"],
        "الأحد": ["قلب", "أسنان", "عيون", "عظام"],
        "الإثنين": ["نساء", "مخ وأعصاب", "أسنان"],
        "الثلاثاء": ["نفسية", "أسنان", "عظام"],
        "الأربعاء": ["أسنان", "قلب", "اطفال"],
        "الخميس": ["قلب", "أنف وأذن", "عظام"],
        "الجمعة": ["باطنة ومناظير"]
    };

    function initSidebar() {
        const list = document.getElementById('days-list');
        Object.keys(schedule).forEach(day => {
            const btn = document.createElement('button');
            btn.className = 'day-btn';
            btn.innerText = day;
            btn.onclick = () => toggleClinics(day, btn);
            
            const container = document.createElement('div');
            container.className = 'clinics-container';
            container.id = `clinics-${day}`;
            
            schedule[day].forEach(clinic => {
                const link = document.createElement('div');
                link.className = 'clinic-link';
                link.innerText = clinic;
                link.onclick = () => loadBookings(day, clinic);
                container.appendChild(link);
            });

            list.appendChild(btn);
            list.appendChild(container);
        });
    }

    function toggleClinics(day, btn) {
        document.querySelectorAll('.clinics-container').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`clinics-${day}`).style.display = 'flex';
        btn.classList.add('active');
        loadBookings(day, "الكل");
    }

    async function loadBookings(day = "الكل", clinic = "الكل") {
        const tbody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');
        const ticker = document.getElementById('latest-booking');
        const viewTitle = document.getElementById('current-view-title');

        viewTitle.innerText = `عرض: ${day === "الكل" ? "كل الأيام" : day} | ${clinic === "الكل" ? "كل العيادات" : clinic}`;
        tbody.innerHTML = "";
        loader.style.display = "block";

        try {
            // إضافة cachebust لضمان جلب أحدث بيانات
            const response = await fetch(SHEET_URL + '&cachebust=' + new Date().getTime());
            const data = await response.text();
            
            // تقسيم الأسطر ومعالجة الفواصل
            const rows = data.split('\n').map(row => {
                return row.split(',').map(cell => cell.trim().replace(/"/g, ''));
            });
            
            loader.style.display = "none";

            // استثناء سطر العناوين
            const bookings = rows.slice(1).filter(r => r.length > 1 && r[0] !== "");

            if (bookings.length > 0) {
                const last = bookings[bookings.length - 1];
                ticker.innerHTML = `⚠️ آخر حجز مسجل في النظام: ${last[0]} - عيادة ${last[2]}`;
            }

            let found = false;
            let displayCounter = 1;

            bookings.forEach(cols => {
                // ترتيب الأعمدة في الشيت: [0]الاسم، [1]اليوم، [2]العيادة، [3]الطبيب، [4]التاريخ
                const patient = cols[0];
                const rowDay = cols[1];
                const specialty = cols[2];
                const doctor = cols[3] || '-';
                const timestamp = cols[4] || '-';

                const matchDay = (day === "الكل" || rowDay === day);
                const matchClinic = (clinic === "الكل" || specialty.includes(clinic));

                if (matchDay && matchClinic) {
                    found = true;
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight:bold; color:var(--primary-color); text-align:center;">${displayCounter}</td> 
                            <td>${patient}</td>
                            <td>${specialty}</td>
                            <td>${doctor}</td>
                            <td>${rowDay}</td>
                            <td style="direction:ltr; text-align:right;">${timestamp}</td>
                        </tr>`;
                    displayCounter++;
                }
            });

            if (!found) tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 20px;'>لا توجد حجوزات مسجلة لهذا الاختيار حتى الآن</td></tr>";
        } catch (e) { 
            loader.innerText = "فشل في جلب البيانات. تأكد من نشر الملف كـ CSV."; 
            console.error(e);
        }
    }

    window.saveAsImage = function() {
        html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `حجوزات_مجمع_شبراملس_${day === "الكل" ? "عام" : day}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    document.getElementById('today-date').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    initSidebar();
    loadBookings();
    
    // تحديث تلقائي كل 60 ثانية
    setInterval(() => {
        const activeBtn = document.querySelector('.day-btn.active');
        const activeDay = activeBtn ? activeBtn.innerText : "الكل";
        loadBookings(activeDay, "الكل");
    }, 60000);
</script>
</body>
</html>
