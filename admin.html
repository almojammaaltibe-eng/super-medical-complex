<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مجمع شبراملس الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0097a7; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; direction: rtl; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: var(--primary); color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .status-msg { text-align: center; padding: 20px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 لوحة تحكم حجوزات مجمع شبراملس</h1>
    <div id="status" class="status-msg">جاري تحميل البيانات... ⏳</div>
    <table id="adminTable" style="display:none;">
        <thead>
            <tr>
                <th>الدور</th>
                <th>اسم المريض</th>
                <th>العيادة</th>
                <th>الطبيب</th>
                <th>اليوم</th>
                <th>وقت التسجيل</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // رابط جوجل شيت الخاص بك المباشر (CSV)
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo0c_d872Pwd3J8f0E6J888snH1yiXfxAU8frZfHsmnXLLX8-71au8zedPQTa0itwXIsWQzs0aNZUS/pub?output=csv";

    async function fetchData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // تجاهل العنوان
            
            const tableBody = document.getElementById('tableBody');
            const status = document.getElementById('status');
            const table = document.getElementById('adminTable');
            
            tableBody.innerHTML = "";

            if (rows.length === 0 || rows[0].trim() === "") {
                status.innerText = "لا توجد حجوزات مسجلة حالياً.";
                return;
            }

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 5) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cols[5] || '-'}</td>
                        <td>${cols[0]}</td>
                        <td>${cols[1]}</td>
                        <td>${cols[2]}</td>
                        <td>${cols[3]}</td>
                        <td>${cols[4]}</td>
                    `;
                    tableBody.appendChild(tr);
                }
            });

            status.style.display = "none";
            table.style.display = "table";

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "❌ فشل في جلب البيانات. تأكد من نشر الملف كـ CSV.";
        }
    }

    // تحديث تلقائي كل دقيقة
    fetchData();
    setInterval(fetchData, 60000);
</script>

</body>
</html>
